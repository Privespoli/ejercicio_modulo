<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISCILA - Modulos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-gradient">PRISCILA - Modulos</h1>
        <p class="text-muted">Actividades - 07.04.2026</p>
        
        <div id="pantallaPrincipal" class="custom-card mx-auto mb-4" style="max-width: 500px; border-top-color: #667eea;">
            <h4 class="text-muted">Esperando identificación...</h4>
            <button type="button" class="btn btn-custom mt-2" data-bs-toggle="modal" data-bs-target="#nombreModal">
                Identificarse
            </button>
        </div>
    </header>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4">
            <div class="custom-card card-temp">
                <h5>Convertir Temperatura</h5>
                <input type="number" id="tempInput" class="form-control" placeholder="Celsius">
                <button id="btnConvertir" class="btn btn-custom mt-3">Convertir a Fahrenheit</button>
                <div id="resultado" class="res-box">---</div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="custom-card card-saludo">
                <h5>Saludador - idiomas</h5>
                <input type="text" id="nombreInput" class="form-control mb-2" placeholder="Nombre">
                <select id="idiomaSelect" class="form-select">
                    <option value="es">Español</option>
                    <option value="en">Inglés</option>
                    <option value="fr">Francés</option>
                    <option value="pt">Portugues</option>
                </select>
                <button id="btnSaludar" class="btn btn-custom mt-3">Generar Saludo</button>
                <div id="resultadoSaludo" class="res-box">---</div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="custom-card card-geo">
                <h5>Área del Círculo</h5>
                <input type="number" id="circuloInput" class="form-control" placeholder="Radio">
                <button id="circuloBtn" class="btn btn-custom mt-3">Calcular</button>
                <div id="circuloRes" class="res-box">---</div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="custom-card card-geo">
                <h5>Área del Cuadrado</h5>
                <input type="number" id="cuadradoInput" class="form-control" placeholder="Lado">
                <button id="cuadradoBtn" class="btn btn-custom mt-3">Calcular Área</button>
                <div id="cuadradoRes" class="res-box">---</div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="custom-card card-pass">
                <h5>Password de Seguridad</h5>
                <input type="text" id="passInput" class="form-control" placeholder="Escribe aquí...">
                <div class="mt-3 d-flex align-items-center gap-2">
                    <span>Nivel:</span>
                    <span id="passNivel" class="badge-status">Esperando...</span>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="custom-card card-count text-center">
                <h5>Contador</h5>
                <div class="counter-group mt-3">
                    <button id="btnMenos" class="btn-round">-</button>
                    <span id="numeroDisplay" class="counter-value">0</span>
                    <button id="btnMas" class="btn-round">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="nombreModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Registro de Usuario</h5>
            </div>
            <div class="modal-body">
                <input type="text" id="inputNombreModal" class="form-control p-3" placeholder="Ingresa tu nombre">
            </div>
            <div class="modal-footer border-0">
                <button type="button" id="btnEnviarNombre" class="btn btn-custom">Confirmar y Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./modulos.js"></script>
</body>
</html>
